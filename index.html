      isActive=${(drag && drag.kind === 'motor') || isSel('motor')}
      selected=${isSel('motor')}
      onPointerDown=${onPointerDown('motor')}
      onDoubleClick=${onDoubleClick('motor')}
    />
  `);

  if (state.stages === 1) {
    items.push(html`
      <${ShaftCircle}
        key="output"
        pos=${state.output}
        shaftDia=${sd}
        pulleys=${[{ r: calc.stage1.r2, color: 'var(--belt1)' }]}
        label="OUT"
        isActive=${(drag && drag.kind === 'output') || isSel('output')}
        selected=${isSel('output')}
        onPointerDown=${onPointerDown('output')}
        onDoubleClick=${onDoubleClick('output')}
      />
    `);
  } else {
    const interPulleys = [
      { r: calc.stage1.r2, color: 'var(--belt1)' },
      { r: calc.stage2.r1, color: 'var(--belt2)' },
    ];
    items.push(html`
      <${ShaftCircle}
        key="inter"
        pos=${state.intermediate}
        shaftDia=${sd}
        pulleys=${interPulleys}
        label="INT"
        isActive=${(drag && drag.kind === 'intermediate') || isSel('intermediate')}
        selected=${isSel('intermediate')}
        onPointerDown=${onPointerDown('intermediate')}
        onDoubleClick=${onDoubleClick('intermediate')}
      />
    `);
    items.push(html`
      <${ShaftCircle}
        key="output2"
        pos=${state.output}
        shaftDia=${sd}
        pulleys=${[{ r: calc.stage2.r2, color: 'var(--belt2)' }]}
        label="OUT"
        isActive=${(drag && drag.kind === 'output') || isSel('output')}
        selected=${isSel('output')}
        onPointerDown=${onPointerDown('output')}
        onDoubleClick=${onDoubleClick('output')}
      />
    `);
  }

  return html`<g>${items}</g>`;
}

function ShaftCircle({ pos, shaftDia, pulleys, label, isActive, selected, onPointerDown, onDoubleClick }) {
  const stroke = isActive ? 'var(--accent)' : 'var(--line)';
  const strokeW = isActive ? 0.7 : 0.5;
  const maxR = Math.max(...pulleys.map(p => p.r));
  return html`
    <g transform=${`translate(${pos.x},${pos.y})`}
       style=${{ cursor: 'grab' }}
       onPointerDown=${onPointerDown}
       onDoubleClick=${onDoubleClick}>
      <circle cx="0" cy="0" r=${maxR + 2.5}
        fill="none" stroke="var(--accent)" stroke-width="0.3"
        stroke-dasharray="1.5 1.2" opacity="0.85"
        visibility=${selected ? 'visible' : 'hidden'}
        pointer-events="none"/>
      ${pulleys.map((p, i) => html`
        <circle key=${i} cx="0" cy="0" r=${p.r}
          fill="none" stroke=${p.color} stroke-width=${strokeW}
          opacity=${isActive ? 1 : 0.85} />
        <circle key=${i + '_in'} cx="0" cy="0" r=${Math.max(0.5, p.r - 1.5)}
          fill="none" stroke=${p.color} stroke-width="0.15" opacity="0.45"/>
      `)}
      <circle cx="0" cy="0" r=${shaftDia / 2}
        fill="var(--bg)" stroke=${stroke} stroke-width=${strokeW + 0.1}/>
      <line x1=${-shaftDia / 2 - 2} y1="0" x2=${shaftDia / 2 + 2} y2="0"
        stroke=${stroke} stroke-width="0.2"/>
      <line x1="0" y1=${-shaftDia / 2 - 2} x2="0" y2=${shaftDia / 2 + 2}
        stroke=${stroke} stroke-width="0.2"/>
      <text x="0" y=${-(maxR + 3.5)}
        text-anchor="middle"
        font-family="var(--mono)" font-size="4.5"
        fill=${isActive ? 'var(--accent)' : 'var(--line)'}>
        ${label}
      </text>
      <text x="0" y=${maxR + 6}
        text-anchor="middle"
        font-family="var(--mono)" font-size="3.5"
        fill="var(--line-dim)">
        ${Math.round(pos.x)}, ${Math.round(pos.y)}
      </text>
    </g>
  `;
}

// ============================================================
// SCENE: TENSIONERS
// ============================================================

function TensionerLayer({ state, calc, drag, selected, onPointerDown, onDoubleClick }) {
  const items = [];
  const isSel = (b) => selected && selected.kind === 'tensioner' && selected.beltIdx === b;
  // Place the idler label on the OUTSIDE of the belt's centerline (the side
  // of the tensioner facing away from line motor↔driven). This avoids the
  // label sitting between belt segments and overlapping the badge/dim
  // label that crowd the middle region.
  const labelDir = (stageIdx, tens) => {
    const a = stageIdx === 1 ? state.motor : state.intermediate;
    const b = stageIdx === 1
      ? (state.stages === 1 ? state.output : state.intermediate)
      : state.output;
    const dx = b.x - a.x, dy = b.y - a.y;
    const len = Math.hypot(dx, dy);
    if (len < 1) return { x: 0, y: -1 };
    const px = -dy / len, py = dx / len;
    const sd = (tens.x - a.x) * px + (tens.y - a.y) * py;
    const sign = sd >= 0 ? 1 : -1;
    return { x: px * sign, y: py * sign };
  };
  if (state.stage1.tensioner) {
    items.push(html`
      <${TensionerCircle}
        key="t1"
        pos=${state.stage1.tensioner}
        diameter=${state.stage1.tensionerDiameter}
        side=${state.stage1.tensionerSide}
        color="var(--belt1)"
        labelDir=${labelDir(1, state.stage1.tensioner)}
        isActive=${(drag && drag.kind === 'tensioner' && drag.beltIdx === 1) || isSel(1)}
        selected=${isSel(1)}
        onPointerDown=${onPointerDown('tensioner', 1)}
        onDoubleClick=${onDoubleClick('tensioner', 1)}
      />
    `);
  }
  if (state.stages === 2 && state.stage2.tensioner) {
    items.push(html`
      <${TensionerCircle}
        key="t2"
        pos=${state.stage2.tensioner}
        diameter=${state.stage2.tensionerDiameter}
        side=${state.stage2.tensionerSide}
        color="var(--belt2)"
        labelDir=${labelDir(2, state.stage2.tensioner)}
        isActive=${(drag && drag.kind === 'tensioner' && drag.beltIdx === 2) || isSel(2)}
        selected=${isSel(2)}
        onPointerDown=${onPointerDown('tensioner', 2)}
        onDoubleClick=${onDoubleClick('tensioner', 2)}
      />
    `);
  }
  return html`<g>${items}</g>`;
}

function TensionerCircle({ pos, diameter, side, color, labelDir, isActive, selected, onPointerDown, onDoubleClick }) {
  const r = diameter / 2;
  const stroke = isActive ? 'var(--accent)' : color;
  const sideLabel = side === 'inverted' ? 'EXT' : 'INT';
  const ldX = (labelDir && labelDir.x) || 0;
  const ldY = (labelDir && labelDir.y) || -1;
  const lx = ldX * (r + 3);
  const ly = ldY * (r + 3) + (ldY >= 0 ? 2 : 0); // baseline adjust for "below" placement
  return html`
    <g transform=${`translate(${pos.x},${pos.y})`}
       style=${{ cursor: 'grab' }}
       onPointerDown=${onPointerDown}
       onDoubleClick=${onDoubleClick}>
      <circle cx="0" cy="0" r=${r + 2.5}
        fill="none" stroke="var(--accent)" stroke-width="0.3"
        stroke-dasharray="1.5 1.2" opacity="0.85"
        visibility=${selected ? 'visible' : 'hidden'}
        pointer-events="none"/>
      <circle cx="0" cy="0" r=${r}
        fill="var(--bg)" stroke=${stroke} stroke-width="0.5"/>
      <circle cx="0" cy="0" r=${r - 1.5} fill="none" stroke=${stroke}
        stroke-width="0.2" opacity="0.5"/>
      <circle cx="0" cy="0" r="1.2" fill=${stroke}/>
      <text x=${lx} y=${ly} text-anchor="middle"
        font-family="var(--mono)" font-size="3" fill=${stroke}>
        ⌀${diameter} ${sideLabel}
      </text>
    </g>
  `;
}

// ============================================================
// SCENE: NUDGE ARROW WIDGET
// ============================================================

// Returns mm/pixel for the current viewBox (assumes square pixels in scene).
function pxPerMm(viewBox) {
  // Approximate: 1mm = (viewport mm) / (viewBox.w) — but we don't know
  // viewport in mm directly. We use viewBox.w as our 'screen reference'
  // and pick arrow sizes proportional to it so they look consistent at
  // every zoom level.
  return viewBox.w / 100; // 1 unit ≈ 1% of viewBox width
}

// Blender-style 2D gizmo: red X arrow + green Y arrow. Drag axis = element
// moves only along that axis. Y points in +SVG-Y (visually down) so the
// world axis matches the screen direction.
function ArrowWidget({ state, calc, selected, viewBox, onAxisDragStart }) {
  const { kind, beltIdx } = selected;
  let pos = null, ring = 0;
  if (kind === 'motor')             { pos = state.motor; ring = calc.stage1.r1; }
  else if (kind === 'intermediate') {
    pos = state.intermediate;
    ring = state.stages === 2 ? Math.max(calc.stage1.r2, calc.stage2.r1) : calc.stage1.r2;
  }
  else if (kind === 'output') {
    pos = state.output;
    ring = state.stages === 2 ? calc.stage2.r2 : calc.stage1.r2;
  }
  else if (kind === 'tensioner') {
    pos = state[`stage${beltIdx}`].tensioner;
    ring = state[`stage${beltIdx}`].tensionerDiameter / 2;
  }
  if (!pos) return null;

  const u = pxPerMm(viewBox);
  // Thin & short, from element center (Blender-style). Shaft length 2.5×
  // smaller than the long version. Hit-zone starts PAST the ring so the
  // gizmo doesn't steal dblclick from the element underneath.
  const inner = 0;
  const outer = Math.max(9.5 * u, ring + 4 * u); // total length from center
  const headLen = 1.2 * u;
  const headHalf = 0.5 * u;
  const tipDist = outer + headLen;
  const lineW = 0.15 * u;
  const hitInner = ring + 1 * u;     // hit-zone starts outside element ring
  const hitW = 2.5 * u;

  const axes = [
    { axis: 'x', dx: 1, dy: 0, color: '#ff5d5d', label: 'X' },
    { axis: 'y', dx: 0, dy: 1, color: '#7eea7c', label: 'Y' },
  ];

  return html`
    <g class="gizmo" pointer-events="auto">
      ${axes.map((a) => {
        const x0 = pos.x + a.dx * inner;
        const y0 = pos.y + a.dy * inner;
        const x1 = pos.x + a.dx * outer;
        const y1 = pos.y + a.dy * outer;
        const xt = pos.x + a.dx * tipDist;
        const yt = pos.y + a.dy * tipDist;
        // Arrowhead triangle: tip at (xt,yt), base perpendicular to axis
        const px = -a.dy, py = a.dx;
        const b1x = x1 + px * headHalf, b1y = y1 + py * headHalf;
        const b2x = x1 - px * headHalf, b2y = y1 - py * headHalf;
        const triPts = `${xt},${yt} ${b1x},${b1y} ${b2x},${b2y}`;
        const labelX = pos.x + a.dx * (tipDist + 2 * u);
        const labelY = pos.y + a.dy * (tipDist + 2 * u) + (a.axis === 'x' ? 1.0 * u : 0);
        const hx0 = pos.x + a.dx * hitInner;
        const hy0 = pos.y + a.dy * hitInner;
        return html`
          <g key=${a.axis}
             style=${{ cursor: 'pointer' }}
             onPointerDown=${onAxisDragStart(a.axis)}>
            <!-- Hit area starts past the ring so element dblclick isn't stolen -->
            <line x1=${hx0} y1=${hy0} x2=${xt} y2=${yt}
              stroke="transparent" stroke-width=${hitW}
              stroke-linecap="butt"/>
            <line x1=${x0} y1=${y0} x2=${x1} y2=${y1}
              stroke=${a.color} stroke-width=${lineW}
              stroke-linecap="butt" pointer-events="none"/>
            <polygon points=${triPts} fill=${a.color} stroke="none"
              pointer-events="none"/>
            <text x=${labelX} y=${labelY}
              text-anchor="middle" dominant-baseline="middle"
              font-family="var(--mono)" font-size=${1.6 * u}
              font-weight="bold" fill=${a.color} pointer-events="none">
              ${a.label}
            </text>
          </g>
        `;
      })}
    </g>
  `;
}

// ============================================================
// SCENE: DIMENSIONS (center distance per stage)
// ============================================================

function Dimensions({ state, calc, setDistEdit }) {
  const lines = [];
  const addDim = (key, stageIdx, a, b, label) => {
    const onDbl = (evt) => {
      evt.stopPropagation();
      setDistEdit({ stageIdx, screenX: evt.clientX, screenY: evt.clientY });
    };
    lines.push(html`<${DimLine} key=${key} a=${a} b=${b} label=${label}
      onDoubleClick=${onDbl} />`);
  };

  if (state.stages === 1) {
    addDim('d1', 1, state.motor, state.output, `C = ${calc.stage1.C.toFixed(1)} mm`);
  } else {
    addDim('d1', 1, state.motor, state.intermediate, `C₁ = ${calc.stage1.C.toFixed(1)}`);
    addDim('d2', 2, state.intermediate, state.output, `C₂ = ${calc.stage2.C.toFixed(1)}`);
  }
  return html`<g>${lines}</g>`;
}

function DimLine({ a, b, label, onDoubleClick }) {
  const dx = b.x - a.x, dy = b.y - a.y;
  const len = Math.hypot(dx, dy);
  if (len < 1) return null;
  const ux = dx / len, uy = dy / len;
  // Perpendicular for label offset — pick the side with larger SVG Y
  // (visually lower) so labels don't collide with axis ticks.
  const perp = uy >= 0 ? { x: -uy, y: ux } : { x: uy, y: -ux };
  const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2;
  const labelOffset = 3.5;
  // Rotate label to follow the line direction; flip if going right-to-left so
  // text never reads upside-down.
  let deg = Math.atan2(uy, ux) * RAD2DEG;
  if (deg > 90 || deg < -90) deg += 180;
  const lx = mx + perp.x * labelOffset;
  const ly = my + perp.y * labelOffset;
  return html`
    <g class="dim">
      <line x1=${a.x} y1=${a.y} x2=${b.x} y2=${b.y}
        stroke="var(--dim)" stroke-width="0.3" stroke-dasharray="3 2" opacity="0.85"
        pointer-events="none"/>
      <text x=${lx} y=${ly}
        text-anchor="middle" dominant-baseline="middle"
        transform=${`rotate(${deg.toFixed(2)} ${lx} ${ly})`}
        font-family="var(--mono)" font-size="3.8" fill="var(--dim)"
        style=${{ cursor: 'pointer' }}
        onDoubleClick=${onDoubleClick}>
        ${label}
      </text>
    </g>
  `;
}

// ============================================================
// RESULTS PANEL
// ============================================================

function ResultsPanel({ state, calc }) {
  const stageRows = (idx, info) => {
    if (!info) return null;
    const wrap = info.wrap;
    const wrapClass = wrap < 90 ? 'error' : (wrap < 120 ? 'warn' : 'good');
    const mesh = info.meshTeeth;
    const meshClass = mesh < 3 ? 'error' : (mesh < 5 ? 'warn' : 'good');
    const dL = Math.abs(info.nearest.delta);
    const stdRange = (BELT_PROFILES[state.beltProfile].standardLengths);
    const inRange = info.Lreal >= stdRange[0] - 5 && info.Lreal <= stdRange[stdRange.length-1] + 5;
    const dLClass = !inRange ? 'warn' : (dL > 5 ? 'warn' : 'good');

    return html`
      <div class="stage-block stage${idx}" key=${idx}>
        <div class="stage-title">${state.stages === 1 ? 'Ступень' : `Ступень ${idx}`}</div>
        <div class="result-row">
          <span class="label">D₁ (ведущий)</span>
          <span class="value">${info.D1.toFixed(2)} mm</span>
        </div>
        <div class="result-row">
          <span class="label">D₂ (ведомый)</span>
          <span class="value">${info.D2.toFixed(2)} mm</span>
        </div>
        <div class="result-row">
          <span class="label">C (межосевое)</span>
          <span class="value">${info.C.toFixed(2)} mm</span>
        </div>
        <div class="result-row">
          <span class="label">L (open formula)</span>
          <span class="value">${info.Lopen.toFixed(2)} mm</span>
        </div>
        <div class="result-row">
          <span class="label">L (с натяжителем)</span>
          <span class="value">${info.Lreal.toFixed(2)} mm</span>
        </div>
        <div class="result-row">
          <span class="label">Ближайший стандарт</span>
          <span class="value">${info.nearest.length} mm</span>
        </div>
        <div class="result-row">
          <span class="label">Δ до стандарта</span>
          <span class="value ${dLClass}">${info.nearest.delta >= 0 ? '+' : ''}${info.nearest.delta.toFixed(2)} mm</span>
        </div>
        <div class="result-row">
          <span class="label">Угол обхвата (мал.)</span>
          <span class="value ${wrapClass}">${wrap.toFixed(1)}°</span>
        </div>
        <div class="result-row">
          <span class="label">Зубьев в зацеплении</span>
          <span class="value ${meshClass}">${mesh} / ${info.smallTeeth}</span>
        </div>
        <div class="result-row">
          <span class="label">Редукция ступени</span>
          <span class="value">1:${info.ratio.toFixed(3)}</span>
        </div>
        ${dL > 5 && inRange && html`
          <div class="help">
            Подвинь оси или натяжитель, чтобы выйти на стандарт ${info.nearest.length}мм
            (нужно ${info.nearest.delta > 0 ? 'сжать' : 'раздвинуть'} ~${dL.toFixed(1)}мм).
          </div>
        `}
        ${!inRange && html`
          <div class="help">
            Длина вне диапазона стандартов для ${state.beltProfile}.
            Возможно, нужен open-ended ремень с зажимами.
          </div>
        `}
      </div>
    `;
  };

  const totalRatio = calc.totalReduction;
  const arcsec = calc.arcsecPerMicrostep;
  const fullStepArcsec = arcsec * state.microstep;

  return html`
    <div class="panel right">
      <h2>Расчёт</h2>

      ${stageRows(1, calc.stage1)}
      ${state.stages === 2 && stageRows(2, calc.stage2)}

      <h3>Итого</h3>
      <div class="result-row">
        <span class="label">Полная редукция</span>
        <span class="value">1:${totalRatio.toFixed(3)}</span>
      </div>
      <div class="result-row">
        <span class="label">Габариты (W × H)</span>
        <span class="value">${calc.bbox.w.toFixed(0)} × ${calc.bbox.h.toFixed(0)} mm</span>
      </div>
      <div class="result-row">
        <span class="label">Bounding box origin</span>
        <span class="value dim">(${calc.bbox.x.toFixed(0)}, ${calc.bbox.y.toFixed(0)})</span>
      </div>

      <h3>Угловое разрешение</h3>
      <div class="result-row">
        <span class="label">Шаг (full step)</span>
        <span class="value">${formatArcsec(fullStepArcsec)}</span>
      </div>
      <div class="result-row">
        <span class="label">Микрошаг ${state.microstep}x</span>
        <span class="value">${formatArcsec(arcsec)}</span>
      </div>
      <div class="result-row">
        <span class="label">Микрошагов на ¼ оборота</span>
        <span class="value">${Math.round(state.stepsPerRev * state.microstep * totalRatio / 4)}</span>
      </div>
      <div class="result-row">
        <span class="label">Микрошагов на 360°</span>
        <span class="value">${Math.round(state.stepsPerRev * state.microstep * totalRatio)}</span>
      </div>

      <div class="help">
        <b>Условные обозначения:</b><br/>
        Угол обхвата: <span class="badge warn">&lt;120°</span> жёлтый, <span class="badge error">&lt;90°</span> красный<br/>
        Зубья в зацеплении: <span class="badge warn">&lt;5</span> жёлтый, <span class="badge error">&lt;3</span> красный<br/>
        Δ&gt;5мм — далеко от стандарта; потребует подвижки осей или натяжителя.
      </div>
    </div>
  `;
}

function formatArcsec(secs) {
  if (!isFinite(secs)) return '—';
  if (secs >= 60) {
    const minutes = Math.floor(secs / 60);
    const s = secs - minutes * 60;
    return `${minutes}′ ${s.toFixed(1)}″`;
  }
  return `${secs.toFixed(2)}″ /step`;
}

// ============================================================
// EDIT MODAL
// ============================================================

// Identify which stage/role a target belongs to, what its anchor is, and how
// to compute the belt length for a candidate position. Used by EditModal's
// "snap to standard length" action.
function editTarget(kind, beltIdx, state) {
  const stagesN = state.stages;
  if (kind === 'motor') {
    const anchor = stagesN === 1 ? state.output : state.intermediate;
    return { stageIdx: 1, anchor, role: 'shaft' };
  }
  if (kind === 'output') {
    const sIdx = stagesN === 1 ? 1 : 2;
    const anchor = stagesN === 1 ? state.motor : state.intermediate;
    return { stageIdx: sIdx, anchor, role: 'shaft' };
  }
  if (kind === 'intermediate') {
    return { stageIdx: 1, anchor: state.motor, role: 'shaft' };
  }
  if (kind === 'tensioner') {
    const sIdx = beltIdx;
    const anchor = sIdx === 1
      ? midpoint(state.motor, stagesN === 1 ? state.output : state.intermediate)
      : midpoint(state.intermediate, state.output);
    return { stageIdx: sIdx, anchor, role: 'tensioner' };
  }
  return null;
}

function midpoint(a, b) { return { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 }; }

// Sample belt length as a function of position along search direction.
function sampleLengthAtPos(state, kind, beltIdx, candidate) {
  const trial = JSON.parse(JSON.stringify(state));
  if (kind === 'motor') trial.motor = candidate;
  else if (kind === 'output') trial.output = candidate;
  else if (kind === 'intermediate') trial.intermediate = candidate;
  else if (kind === 'tensioner') {
    trial[`stage${beltIdx}`].tensioner = candidate;
  }
  const calc = computeAll(trial);
  // For 'output' in 2 stages we want stage 2; otherwise stage 1.
  if (kind === 'output') {
    const sIdx = state.stages === 1 ? 1 : 2;
    return calc[`stage${sIdx}`].Lreal;
  }
  if (kind === 'motor' || kind === 'intermediate') return calc.stage1.Lreal;
  return calc[`stage${beltIdx}`].Lreal;
}

// Find candidate position along ray from anchor through current position that
// produces belt length closest to nearestStd. For shafts: vary distance from
// anchor. For tensioner: vary perpendicular distance from belt centerline.
// Skips candidates that would cause pulley/tensioner overlap.
function snapToStdLength(state, kind, beltIdx) {
  const target = editTarget(kind, beltIdx, state);
  if (!target) return null;
  const cur = (kind === 'output') ? state.output
            : kind === 'intermediate' ? state.intermediate
            : kind === 'motor' ? state.motor
            : state[`stage${beltIdx}`].tensioner;
  if (!cur) return null;

  const profile = BELT_PROFILES[state.beltProfile];
  const curLen = sampleLengthAtPos(state, kind, beltIdx, cur);
  const std = nearestStandard(curLen, profile.standardLengths).length;

  // Pulley radii for the stage(s) this element belongs to — used to enforce
  // non-overlap during the search.
  const pitch = profile.pitch;
  const stIdx = (kind === 'tensioner' || kind === 'motor' || kind === 'intermediate')
    ? (kind === 'tensioner' ? beltIdx : 1)
    : (state.stages === 1 ? 1 : 2);
  const stConf = state[`stage${stIdx}`];
  const stageR1 = outerDiameter(stConf.drivingTeeth, pitch) / 2;
  const stageR2 = outerDiameter(stConf.drivenTeeth, pitch) / 2;
  const clearance = 1;

  // Search direction
  let dirX, dirY, baseX, baseY;
  let minDist = 5;
  if (target.role === 'shaft') {
    const ax = target.anchor.x, ay = target.anchor.y;
    let vx = cur.x - ax, vy = cur.y - ay;
    let vlen = Math.hypot(vx, vy);
    if (vlen < 1) { vx = 1; vy = 0; vlen = 1; }
    dirX = vx / vlen; dirY = vy / vlen;
    baseX = ax; baseY = ay;
    // For shaft moves: keep pulleys from overlapping.
    minDist = Math.max(5, stageR1 + stageR2 + clearance);
  } else {
    // tensioner: perpendicular to belt centerline (anchor to anchor of stage)
    const sIdx = beltIdx;
    const p1 = sIdx === 1 ? state.motor : state.intermediate;
    const p2 = sIdx === 1
      ? (state.stages === 1 ? state.output : state.intermediate)
      : state.output;
    const dx = p2.x - p1.x, dy = p2.y - p1.y;
    const dl = Math.hypot(dx, dy) || 1;
    let nx = -dy / dl, ny = dx / dl;
    const along = (cur.x - target.anchor.x) * nx + (cur.y - target.anchor.y) * ny;
    if (along < 0) { nx = -nx; ny = -ny; }
    dirX = nx; dirY = ny;
    baseX = target.anchor.x; baseY = target.anchor.y;
  }

  // For tensioner candidates we need to test distance to BOTH pulleys.
  const tR = (kind === 'tensioner') ? (stConf.tensionerDiameter / 2) : 0;
  const tensShaftA = kind === 'tensioner'
    ? (beltIdx === 1 ? state.motor : state.intermediate) : null;
  const tensShaftB = kind === 'tensioner'
    ? (beltIdx === 1
        ? (state.stages === 1 ? state.output : state.intermediate)
        : state.output)
    : null;

  let bestPos = cur, bestErr = Math.abs(curLen - std);
  for (let i = 1; i <= 200; i++) {
    const d = minDist + (i / 200) * (500 - minDist);
    const px = baseX + dirX * d, py = baseY + dirY * d;
    if (px < -SCENE_HALF_W || px > SCENE_HALF_W || py < -SCENE_HALF_H || py > SCENE_HALF_H) continue;
    // Reject tensioner positions that would overlap a pulley.
    if (kind === 'tensioner') {
      const dA = Math.hypot(px - tensShaftA.x, py - tensShaftA.y);
      const dB = Math.hypot(px - tensShaftB.x, py - tensShaftB.y);
      if (dA < stageR1 + tR + clearance || dB < stageR2 + tR + clearance) continue;
    }
    const L = sampleLengthAtPos(state, kind, beltIdx, { x: px, y: py });
    const err = Math.abs(L - std);
    if (err < bestErr) { bestErr = err; bestPos = { x: px, y: py }; }
  }
  return { pos: bestPos, std, err: bestErr };
}

function EditModal({ state, setState, calc, editing, setEditing, showToast }) {
  const { kind, beltIdx, screenX, screenY } = editing;
  const modalRef = useRef(null);
  const xRef = useRef(null);
  const yRef = useRef(null);

  const getPos = () => {
    if (kind === 'motor') return state.motor;
    if (kind === 'output') return state.output;
    if (kind === 'intermediate') return state.intermediate;
    if (kind === 'tensioner') return state[`stage${beltIdx}`].tensioner;
    return { x: 0, y: 0 };
  };
  const pos = getPos() || { x: 0, y: 0 };

  // Input strings kept locally so user can type intermediate values
  // ("-", "1.5e"…) without the controlled value snapping back.
  const fmt = (n) => (Math.round(n * 100) / 100).toString();
  const [xStr, setXStr] = useState(fmt(pos.x));
  const [yStr, setYStr] = useState(fmt(pos.y));

  // Sync local strings from external state (drag, snap, arrow keys),
  // but only when the input isn't focused — otherwise typing flickers.
  useEffect(() => {
    if (document.activeElement !== xRef.current) setXStr(fmt(pos.x));
    if (document.activeElement !== yRef.current) setYStr(fmt(pos.y));
  }, [pos.x, pos.y]);

  const apply = useCallback((nx, ny) => {
    nx = clampScene(nx, 'x'); ny = clampScene(ny, 'y');
    setState((s) => {
      if (kind === 'motor')        return { ...s, motor:        { x: nx, y: ny } };
      if (kind === 'output')       return { ...s, output:       { x: nx, y: ny } };
      if (kind === 'intermediate') return { ...s, intermediate: { x: nx, y: ny } };
      if (kind === 'tensioner') {
        const key = `stage${beltIdx}`;
        return { ...s, [key]: { ...s[key], tensioner: { x: nx, y: ny } } };
      }
      return s;
    });
  }, [kind, beltIdx, setState]);

  const onXChange = (e) => {
    const v = e.target.value;
    setXStr(v);
    const n = parseFloat(v);
    if (Number.isFinite(n)) apply(n, pos.y);
  };
  const onYChange = (e) => {
    const v = e.target.value;
    setYStr(v);
    const n = parseFloat(v);
    if (Number.isFinite(n)) apply(pos.x, n);
  };

  const close = useCallback(() => setEditing(null), [setEditing]);

  const onSnap = () => {
    const result = snapToStdLength(state, kind, beltIdx);
    if (!result) { showToast('Не удалось найти'); return; }
    apply(result.pos.x, result.pos.y);
    showToast(`L → ${result.std}mm (Δ${result.err.toFixed(2)})`);
  };

  // Reset tension: detach the idler from the belt. Direction depends on mode:
  //   • EXT (inverted): idler is outside the loop → push FURTHER outward
  //     along the perpendicular until it clears the belt.
  //   • INT (auto): idler is inside the loop → pull TOWARD the centerline
  //     (i.e., into the loop interior) so it no longer touches the tangent.
  // Either way the belt straightens to the natural 2-pulley loop.
  const onResetTension = () => {
    if (kind !== 'tensioner') return;
    const stConf = state[`stage${beltIdx}`];
    const tR = stConf.tensionerDiameter / 2;
    const pitch = BELT_PROFILES[state.beltProfile].pitch;
    const r1 = pitchDiameter(stConf.drivingTeeth, pitch) / 2;
    const r2 = pitchDiameter(stConf.drivenTeeth, pitch) / 2;
    const shaftA = beltIdx === 1 ? state.motor : state.intermediate;
    const shaftB = beltIdx === 1
      ? (state.stages === 1 ? state.output : state.intermediate)
      : state.output;
    const dx = shaftB.x - shaftA.x, dy = shaftB.y - shaftA.y;
    const len = Math.hypot(dx, dy);
    if (len < 1) { showToast('Не удалось'); return; }
    const ux = dx / len, uy = dy / len;
    const perpX = -uy, perpY = ux;
    const tens = stConf.tensioner;
    if (!tens) return;

    // Project tensioner onto the centerline and keep its perpendicular side
    const along = (tens.x - shaftA.x) * ux + (tens.y - shaftA.y) * uy;
    const tProj = Math.max(0, Math.min(len, along));
    const projX = shaftA.x + ux * tProj;
    const projY = shaftA.y + uy * tProj;
    const curPerp = (tens.x - shaftA.x) * perpX + (tens.y - shaftA.y) * perpY;
    const sign = curPerp >= 0 ? 1 : -1;

    // Belt's perpendicular extent at the projection point (linear interp
    // of radii along the centerline for unequal pulleys).
    const beltExt = r1 + (r2 - r1) * (tProj / len);
    const isInverted = stConf.tensionerSide === 'inverted';
    // Neutral position for "reset tension" → belt path equals natural:
    //   EXT: tensioner sits tangent to the natural belt boundary (wrap=0)
    //   INT: tensioner on the centerline (collinear → excluded from hull)
    const targetPerp = isInverted ? (beltExt + tR) : 0;
    const newX = clampScene(projX + perpX * sign * targetPerp, 'x');
    const newY = clampScene(projY + perpY * sign * targetPerp, 'y');
    setState((s) => ({
      ...s,
      [`stage${beltIdx}`]: { ...s[`stage${beltIdx}`], tensioner: { x: newX, y: newY } },
    }));
    showToast('Натяжение сброшено');
  };

  // Click anywhere outside the modal → close (current values are already applied)
  useEffect(() => {
    const onDocDown = (e) => {
      if (modalRef.current && !modalRef.current.contains(e.target)) close();
    };
    document.addEventListener('mousedown', onDocDown);
    return () => document.removeEventListener('mousedown', onDocDown);
  }, [close]);

  const title = kind === 'motor' ? 'Motor shaft'
              : kind === 'output' ? 'Output shaft'
              : kind === 'intermediate' ? 'Intermediate shaft'
              : `Tensioner ${beltIdx}`;

  const vw = window.innerWidth, vh = window.innerHeight;
  const modalW = 220, modalH = 140;
  const left = Math.min(Math.max(screenX + 16, 8), vw - modalW - 8);
  const top = Math.min(Math.max(screenY - 20, 8), vh - modalH - 8);

  return html`
    <div ref=${modalRef} class="edit-modal" style=${{ left: `${left}px`, top: `${top}px` }}>
      <h4>${title}</h4>
      <div class="row">
        <label>X (mm)</label>
        <input ref=${xRef} type="number" step="1" value=${xStr}
          onChange=${onXChange}
          onKeyDown=${(e) => e.key === 'Enter' && close()} />
      </div>
      <div class="row">
        <label>Y (mm)</label>
        <input ref=${yRef} type="number" step="1" value=${yStr}
          onChange=${onYChange}
          onKeyDown=${(e) => e.key === 'Enter' && close()} />
      </div>
      <div class="actions">
        ${(() => {
          // Motor is the chain root — moving the motor doesn't help fit a
          // standard belt, so hide entirely. For other elements, disable
          // when their stage's belt length is locked (snap is futile —
          // enforceLocks would revert).
          if (kind === 'motor') return null;
          const elemStage = kind === 'tensioner' ? beltIdx
                          : kind === 'intermediate' ? 1
                          : (state.stages === 1 ? 1 : 2);
          const stageLocked = elemStage && Number.isFinite(state[`stage${elemStage}`]?.lockL);
          const tip = stageLocked
            ? 'недоступно: длина ремня зафиксирована'
            : '';
          return html`
            <button onClick=${onSnap}
              disabled=${stageLocked}
              title=${tip}
              style=${{ whiteSpace: 'nowrap', lineHeight: '1.3' }}>
              подогнать к ближайшему<br/>стандартному ремню
            </button>
          `;
        })()}
        ${kind === 'tensioner' && html`
          <button onClick=${onResetTension}>сбросить натяжение</button>
        `}
      </div>
    </div>
  `;
}

// ============================================================
// DISTANCE MODAL (edit center distance C between two shafts)
// ============================================================

function DistanceModal({ state, setState, calc, distEdit, setDistEdit, showToast }) {
  const { stageIdx, screenX, screenY } = distEdit;
  const modalRef = useRef(null);
  const inputRef = useRef(null);

  // Anchor = shaft that stays put; movable = the other end. Convention:
  // for stage 1 we move the "far" end (output in 1-stage, intermediate in
  // 2-stage). For stage 2 we move output.
  const anchor = stageIdx === 1 ? state.motor : state.intermediate;
  const movable = stageIdx === 1
    ? (state.stages === 1 ? state.output : state.intermediate)
    : state.output;
  const movableKey = stageIdx === 1
    ? (state.stages === 1 ? 'output' : 'intermediate')
    : 'output';

  const info = calc[`stage${stageIdx}`];
  const C = info ? info.C : 0;

  const fmt = (n) => (Math.round(n * 100) / 100).toString();
  const [cStr, setCStr] = useState(fmt(C));

  // Sync from external state when input not focused
  useEffect(() => {
    if (document.activeElement !== inputRef.current) setCStr(fmt(C));
  }, [C]);

  const applyC = useCallback((newC) => {
    if (!Number.isFinite(newC) || newC < 1) return;
    const dx = movable.x - anchor.x, dy = movable.y - anchor.y;
    const oldC = Math.hypot(dx, dy);
    if (oldC < 0.01) return;
    const ratio = newC / oldC;
    const nx = clampScene(anchor.x + dx * ratio, 'x');
    const ny = clampScene(anchor.y + dy * ratio, 'y');
    setState((s) => ({ ...s, [movableKey]: { x: nx, y: ny } }));
  }, [anchor.x, anchor.y, movable.x, movable.y, movableKey, setState]);

  const onCChange = (e) => {
    const v = e.target.value;
    setCStr(v);
    const n = parseFloat(v);
    if (Number.isFinite(n)) applyC(n);
  };

  const close = useCallback(() => setDistEdit(null), [setDistEdit]);

  const onSnap = () => {
    const profile = BELT_PROFILES[state.beltProfile];
    const std = nearestStandard(info.Lreal, profile.standardLengths).length;
    const dx = movable.x - anchor.x, dy = movable.y - anchor.y;
    const oldC = Math.hypot(dx, dy);
    if (oldC < 0.01) return;
    const dirX = dx / oldC, dirY = dy / oldC;
    const tryC = (cand) => {
      const px = anchor.x + dirX * cand;
      const py = anchor.y + dirY * cand;
      return sampleLengthAtPos(state, movableKey, undefined, { x: px, y: py });
    };
    // Lower bound: keep pulleys from overlapping.
    const stConf = state[`stage${stageIdx}`];
    const r1 = outerDiameter(stConf.drivingTeeth, profile.pitch) / 2;
    const r2 = outerDiameter(stConf.drivenTeeth, profile.pitch) / 2;
    const lo = r1 + r2 + 1, hi = 500;
    let bestC = oldC, bestErr = Math.abs(info.Lreal - std);
    for (let i = 0; i < 200; i++) {
      const cand = lo + (i / 199) * (hi - lo);
      const L = tryC(cand);
      const err = Math.abs(L - std);
      if (err < bestErr) { bestErr = err; bestC = cand; }
    }
    applyC(bestC);
    setCStr(fmt(bestC));
    showToast(`L → ${std}mm (Δ${bestErr.toFixed(2)})`);
  };

  useEffect(() => {
    const onDocDown = (e) => {
      if (modalRef.current && !modalRef.current.contains(e.target)) close();
    };
    document.addEventListener('mousedown', onDocDown);
    return () => document.removeEventListener('mousedown', onDocDown);
  }, [close]);

  useEffect(() => {
    if (inputRef.current) inputRef.current.focus();
  }, []);

  const title = state.stages === 1
    ? 'Межосевое расстояние'
    : `Межосевое C${stageIdx === 1 ? '₁' : '₂'}`;

  const vw = window.innerWidth, vh = window.innerHeight;
  const modalW = 220, modalH = 130;
  const left = Math.min(Math.max(screenX + 16, 8), vw - modalW - 8);
  const top = Math.min(Math.max(screenY - 20, 8), vh - modalH - 8);

  const stageLocked = Number.isFinite(state[`stage${stageIdx}`]?.lockL);
  const lockTip = stageLocked
    ? 'недоступно: длина ремня этой ступени зафиксирована (C определяется через L)'
    : '';

  return html`
    <div ref=${modalRef} class="edit-modal" style=${{ left: `${left}px`, top: `${top}px` }}>
      <h4>${title}</h4>
      <div class="row">
        <label>C (mm)</label>
        <input ref=${inputRef} type="number" step="1" value=${cStr}
          disabled=${stageLocked}
          title=${lockTip}
          onChange=${onCChange}
          onKeyDown=${(e) => e.key === 'Enter' && close()} />
      </div>
      <div class="actions">
        <button onClick=${onSnap}
          disabled=${stageLocked}
          title=${lockTip}
          style=${{ whiteSpace: 'nowrap', lineHeight: '1.3' }}>
          подогнать к ближайшему<br/>стандартному ремню
        </button>
      </div>
    </div>
  `;
}

// ============================================================
// BELT LENGTH MODAL (edit belt length L; driven shaft slides along centerline)
// ============================================================

function BeltLengthModal({ state, setState, calc, lengthEdit, setLengthEdit, showToast }) {
  const { stageIdx, screenX, screenY } = lengthEdit;
  const modalRef = useRef(null);
  const inputRef = useRef(null);

  // Anchor stays put; movable end slides along the centerline. Same convention
  // as DistanceModal.
  const anchor = stageIdx === 1 ? state.motor : state.intermediate;
  const movableKey = stageIdx === 1
    ? (state.stages === 1 ? 'output' : 'intermediate')
    : 'output';
  const movable = state[movableKey];

  const info = calc[`stage${stageIdx}`];
  const L = info ? info.Lreal : 0;

  const fmt = (n) => (Math.round(n * 10) / 10).toString();
  const [lStr, setLStr] = useState(fmt(L));

  useEffect(() => {
    if (document.activeElement !== inputRef.current) setLStr(fmt(L));
  }, [L]);

  // Numerically solve for the C (distance along current direction) that
  // produces target L. Works with or without a tensioner. Lower bound = min
  // non-overlapping center distance for the pulleys in this stage.
  const solveCForL = useCallback((targetL) => {
    const dx = movable.x - anchor.x, dy = movable.y - anchor.y;
    const curC = Math.hypot(dx, dy);
    if (curC < 0.01) return null;
    const dirX = dx / curC, dirY = dy / curC;
    const trial = JSON.parse(JSON.stringify(state));
    const profile = BELT_PROFILES[state.beltProfile];
    const stConf = state[`stage${stageIdx}`];
    const r1 = outerDiameter(stConf.drivingTeeth, profile.pitch) / 2;
    const r2 = outerDiameter(stConf.drivenTeeth, profile.pitch) / 2;
    const lo = r1 + r2 + 1, hi = 800;
    let bestC = curC, bestErr = Infinity;
    for (let i = 0; i <= 400; i++) {
      const cand = lo + i * (hi - lo) / 400;
      const px = anchor.x + dirX * cand;
      const py = anchor.y + dirY * cand;
      trial[movableKey] = { x: px, y: py };
      const c = computeAll(trial);
      const cur = c[`stage${stageIdx}`].Lreal;
      const err = Math.abs(cur - targetL);
      if (err < bestErr) { bestErr = err; bestC = cand; }
    }
    return { C: bestC, err: bestErr };
  }, [state, stageIdx, anchor.x, anchor.y, movable.x, movable.y, movableKey]);

  const applyL = useCallback((newL) => {
    if (!Number.isFinite(newL) || newL < 10) return;
    const sol = solveCForL(newL);
    if (!sol) return;
    const dx = movable.x - anchor.x, dy = movable.y - anchor.y;
    const curC = Math.hypot(dx, dy);
    if (curC < 0.01) return;
    const ratio = sol.C / curC;
    const nx = clampScene(anchor.x + dx * ratio, 'x');
    const ny = clampScene(anchor.y + dy * ratio, 'y');
    setState((s) => {
      const next = { ...s, [movableKey]: { x: nx, y: ny } };
      // If this stage is locked, also update the locked value so the live
      // enforce-locks pass doesn't undo our change.
      const sk = `stage${stageIdx}`;
      if (Number.isFinite(s[sk].lockL)) {
        next[sk] = { ...s[sk], lockL: newL };
      }
      return next;
    });
  }, [solveCForL, anchor.x, anchor.y, movable.x, movable.y, movableKey, stageIdx, setState]);

  const isLocked = Number.isFinite(state[`stage${stageIdx}`].lockL);
  const onLockToggle = (e) => {
    const checked = e.target.checked;
    setState((s) => ({
      ...s,
      [`stage${stageIdx}`]: {
        ...s[`stage${stageIdx}`],
        lockL: checked ? Math.round((s[`stage${stageIdx}`].lockL ?? L) * 10) / 10 : null,
      },
    }));
  };

  const onLChange = (e) => {
    const v = e.target.value;
    setLStr(v);
    const n = parseFloat(v);
    if (Number.isFinite(n)) applyL(n);
  };

  const close = useCallback(() => setLengthEdit(null), [setLengthEdit]);

  const onSnap = () => {
    const profile = BELT_PROFILES[state.beltProfile];
    const std = nearestStandard(info.Lreal, profile.standardLengths).length;
    applyL(std);
    setLStr(fmt(std));
    showToast(`L → ${std}mm`);
  };

  useEffect(() => {
    const onDocDown = (e) => {
      if (modalRef.current && !modalRef.current.contains(e.target)) close();
    };
    document.addEventListener('mousedown', onDocDown);
    return () => document.removeEventListener('mousedown', onDocDown);
  }, [close]);

  useEffect(() => { if (inputRef.current) inputRef.current.focus(); }, []);

  const title = state.stages === 1
    ? 'Длина ремня'
    : `Длина ремня L${stageIdx === 1 ? '₁' : '₂'}`;

  const vw = window.innerWidth, vh = window.innerHeight;
  const modalW = 240, modalH = 130;
  const left = Math.min(Math.max(screenX + 16, 8), vw - modalW - 8);
  const top = Math.min(Math.max(screenY - 20, 8), vh - modalH - 8);

  // If lock is on but the enforced L can't reach the target (target is out
  // of achievable range for current direction/teeth/tensioner), L drifts
  // away from lockL. Highlight that mismatch.
  const lockMismatch = isLocked && Math.abs(L - state[`stage${stageIdx}`].lockL) > 1;
  const lockStyle = lockMismatch
    ? { borderColor: 'var(--error)', color: 'var(--error)' }
    : {};
  return html`
    <div ref=${modalRef} class="edit-modal" style=${{ left: `${left}px`, top: `${top}px` }}>
      <h4>${title}</h4>
      <div class="row">
        <label>L (mm)</label>
        <input ref=${inputRef} type="number" step="1" value=${lStr}
          style=${lockStyle}
          onChange=${onLChange}
          onKeyDown=${(e) => e.key === 'Enter' && close()} />
      </div>
      <label class="checkbox-row" style=${{ padding: '4px 0' }}
        title="длина зафиксирована, ведомый шкив подстраивается под изменения teeth/tensioner">
        <input type="checkbox" checked=${isLocked} onChange=${onLockToggle} />
        🔒 зафиксировать длину ремня
      </label>
      ${lockMismatch && html`
        <div class="hint" style=${{ color: 'var(--error)' }}>
          L = ${L.toFixed(1)} mm — заданное значение недостижимо при текущей геометрии
        </div>
      `}
      <div class="actions">
        <button onClick=${onSnap} style=${{ whiteSpace: 'nowrap', lineHeight: '1.3' }}>подогнать к ближайшему<br/>стандартному ремню</button>
      </div>
    </div>
  `;
}

// ============================================================
// ABOUT MODAL
// ============================================================

function AboutModal({ onClose }) {
  useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [onClose]);
  const onBackdrop = (e) => { if (e.target === e.currentTarget) onClose(); };
  return html`
    <div class="about-modal" onClick=${onBackdrop}>
      <div class="content">
        <button class="close" onClick=${onClose} title="Esc">×</button>
        <h2>BELT DRIVE PLANNER</h2>
        <div class="tagline">
          Интерактивный 2D-калькулятор ременной передачи для проектирования
          моторизованных pan/tilt-голов. Профили GT2-2M, GT3-2M, HTD-3M, HTD-5M.
        </div>

        <h3>Авторство</h3>
        <dl>
          <dt>Concept & direction</dt><dd>Stanislav Volkov</dd>
          <dt>Implementation</dt><dd>Claude Code · Anthropic</dd>
        </dl>

        <h3>Технически</h3>
        <dl>
          <dt>Source</dt>
          <dd><a href="https://github.com/WolftheGrey/belt-calc" target="_blank" rel="noopener">github.com/WolftheGrey/belt-calc</a></dd>
          <dt>License</dt><dd>MIT</dd>
          <dt>Stack</dt><dd>React 18 + htm via esm.sh · SVG · Canvas · no build</dd>
        </dl>

        <h3>Жесты</h3>
        <ul>
          <li><b>Click</b> элемент — выделить (появляется XY-гизмо)</li>
          <li><b>Drag</b> — переместить (Shift = по одной оси)</li>
          <li><b>Wheel</b> — zoom; <b>ПКМ</b> / <b>Space</b>+drag / drag пустого холста — pan</li>
          <li><b>Double-click</b> элемента — модалка X/Y</li>
          <li><b>Double-click</b> бейджа длины — редактировать L (+ lock)</li>
          <li><b>Double-click</b> цифры C — редактировать межосевое</li>
          <li><b>←↑→↓</b> — нудж на 1мм (Shift ×10)</li>
        </ul>

        <h3>Натяжитель</h3>
        <ul>
          <li><b>INT</b> — convex hull, как 3-й шкив (зубчатой стороной)</li>
          <li><b>EXT</b> — back-side, гладкая спинка ремня снаружи петли</li>
        </ul>
      </div>
    </div>
  `;
}

// MOUNT

createRoot(document.getElementById('root')).render(html`<${App} />`);
</script>
